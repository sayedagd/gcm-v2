<!DOCTYPE html>
<html lang="ar" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10b981" />
  <link rel="manifest" href="manifest.json" />
  <script src="/config.js"></script>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta property="og:image" content="/logo.png" />
  <title>GCM - GLOBAL CLEAR MISSION</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script>
    // [AR] منع الوميض عند تحميل الصفحة (Dark Mode FOUC Prevention)
    // [EN] Immediately apply theme before rendering to prevent white flash
    (function () {
      try {
        const localTheme = localStorage.getItem('gcm_dark_mode');
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

        // If explicitly set to true OR (not set AND system is dark)
        if (localTheme === 'true' || (!localTheme && systemTheme)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) { }
    })();


  </script>
  <style>
    :root {
      --header-height: 80px;
    }

    html {
      scroll-padding-top: var(--header-height);
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #10b98144;
      border-radius: 10px;
      border: 1px solid transparent;
      background-clip: content-box;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #10b981;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #1e293b;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #10b981;
    }

    @media (min-width: 768px) {
      :root {
        --header-height: 100px;
      }
    }

    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dark .glass {
      background: rgba(15, 23, 42, 0.8);
    }

    .sadu-bg {
      background-image: radial-gradient(#10b981 0.5px, transparent 0.5px);
      background-size: 20px 20px;
    }

    #scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: #10b981;
      z-index: 1001;
      transition: width 0.1s ease-out;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">
  <div id="scroll-progress"></div>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  <script>window.onscroll = function () {
      var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      var scrolled = (winScroll / height) * 100;
      document.getElementById("scroll-progress").style.width = scrolled + "%";
    }

      ;

  </script>
</body>

</html>
