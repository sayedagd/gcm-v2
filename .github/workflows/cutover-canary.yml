name: Cutover Canary

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cutover-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run cutover canary watch
        env:
          CUTOVER_FRONTEND_BASE_URL: ${{ vars.CUTOVER_FRONTEND_BASE_URL || 'https://gcm.twision.agency' }}
          CUTOVER_BACKEND_BASE_URL: ${{ vars.CUTOVER_BACKEND_BASE_URL || 'https://gcm-back.twision.agency' }}
          CUTOVER_WATCH_SAMPLES: ${{ vars.CUTOVER_WATCH_SAMPLES || '3' }}
          CUTOVER_TIMEOUT_MS: ${{ vars.CUTOVER_TIMEOUT_MS || '10000' }}
        run: node scripts/release/cutover-watch.mjs

  alert-on-failure:
    needs:
      - cutover-watch
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Create failure alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[Cutover Canary] Failure ${now}`;
            const body = [
              'Scheduled cutover canary checks failed.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Trigger: ${context.eventName}`,
              `- SHA: ${context.sha}`,
              '',
              'Please inspect the failed job logs and triage immediately.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'cutover', 'canary-failure']
            });