name: Frontend Live Smoke

on:
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: Deployed frontend base URL to smoke test
        required: false
        default: https://gcm.twision.agency
      smoke_enable_mutations:
        description: Run the gated CRUD smoke path
        required: false
        default: "false"
  repository_dispatch:
    types:
      - frontend_smoke_ready

concurrency:
  group: frontend-live-smoke-${{ github.ref || github.event.client_payload.run_id || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend-next
    env:
      SMOKE_BASE_URL: ${{ github.event.client_payload.smoke_base_url || inputs.smoke_base_url || secrets.SMOKE_BASE_URL }}
      SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
      SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
      SMOKE_ENABLE_MUTATIONS: ${{ github.event.client_payload.smoke_enable_mutations || inputs.smoke_enable_mutations || 'false' }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify smoke configuration
        run: |
          test -n "$SMOKE_BASE_URL"
          test -n "$SMOKE_ADMIN_EMAIL"
          test -n "$SMOKE_ADMIN_PASSWORD"

      - name: Run live smoke suite
        run: npm run test:smoke
