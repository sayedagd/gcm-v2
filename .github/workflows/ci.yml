name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2

  openapi-gate:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: OpenAPI sync gate (release blocker)
        run: npm run ci:check

  backend:
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - openapi-gate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gcm_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gcm_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Drizzle schema drift check
        run: npm run db:drizzle:generate && git diff --exit-code drizzle

      - name: Drizzle migration apply check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gcm_ci
        run: npm run db:drizzle:migrate

      - name: Backend auth regression tests
        run: npm test -- --runInBand src/__tests__/unit/loginValidation.test.js src/__tests__/unit/loginLegacyMigration.test.js src/__tests__/unit/loginPasswordHashing.test.js

  frontend:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Frontend lint and policy checks
        run: npm run lint

      - name: Frontend focused tests
        run: npx vitest run src/proxy.test.ts src/lib/server/writeProxy.test.ts src/features/auth/api/loginAction.test.ts

      - name: Frontend production build check
        run: npx next build --webpack
